<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>God Level Chess</title>
<style>
body{margin:0;background:#0f172a;font-family:Arial;color:white;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh}
h1{margin-bottom:10px}
#turn,#status{margin:6px;font-size:20px;font-weight:bold}
#status{color:#facc15;height:24px}
.board{display:grid;grid-template-columns:repeat(8,75px);grid-template-rows:repeat(8,75px);border:4px solid #334155}
.square{display:flex;align-items:center;justify-content:center;font-size:48px;cursor:pointer;user-select:none}
.light{background:#f0d9b5}
.dark{background:#b58863}
.selected{outline:4px solid yellow}
.white-piece{color:#fff;text-shadow:0 0 3px #000}
.black-piece{color:#000}
button{margin-top:15px;padding:10px 20px;border:none;border-radius:8px;cursor:pointer}
</style>
</head>
<body>
<h1>God Level Chess</h1>
<div id="turn"></div>
<div id="material"></div>
<div id="status"></div>
<div class="board" id="board"></div>
<button onclick="resetGame()">Restart</button>
<script>
const initialBoard=[
["r","n","b","q","k","b","n","r"],
["p","p","p","p","p","p","p","p"],
[null,null,null,null,null,null,null,null],
[null,null,null,null,null,null,null,null],
[null,null,null,null,null,null,null,null],
[null,null,null,null,null,null,null,null],
["P","P","P","P","P","P","P","P"],
["R","N","B","Q","K","B","N","R"]];

const symbols={r:"♜",n:"♞",b:"♝",q:"♛",k:"♚",p:"♟",R:"♖",N:"♘",B:"♗",Q:"♕",K:"♔",P:"♙"};

let board,turn,selected,gameOver,enPassantTarget,castleRights;

const boardEl=document.getElementById("board");
const turnEl=document.getElementById("turn");
const statusEl=document.getElementById("status");

function resetGame(){
board=JSON.parse(JSON.stringify(initialBoard));
turn="White";
selected=null;
gameOver=false;
enPassantTarget=null;
castleRights={whiteK:true,whiteQ:true,blackK:true,blackQ:true};
statusEl.textContent="";
draw();
}

function draw(){
updateMaterial();
boardEl.innerHTML="";
for(let r=0;r<8;r++){
for(let c=0;c<8;c++){
const sq=document.createElement("div");
sq.className="square "+((r+c)%2?"dark":"light");
if(selected&&selected.r===r&&selected.c===c)sq.classList.add("selected");
sq.dataset.r=r;sq.dataset.c=c;
const p=board[r][c];
if(p){sq.textContent=symbols[p];sq.classList.add(p===p.toUpperCase()?"white-piece":"black-piece");}
sq.onclick=handleClick;
boardEl.appendChild(sq);
}}
turnEl.textContent="Turn: "+turn;
}

function handleClick(e){
if(gameOver)return;
const r=+e.target.dataset.r,c=+e.target.dataset.c;
const piece=board[r][c];
if(selected){
if(makeMove(selected.r,selected.c,r,c)){
turn=turn==="White"?"Black":"White";
if(isCheckmate(turn)){
statusEl.textContent="CHECKMATE! "+(turn==="White"?"Black":"White")+" WINS";
gameOver=true;
}else if(isCheck(turn)){
statusEl.textContent="CHECK!";
}else statusEl.textContent="";
}
selected=null;draw();return;
}
if(piece&&((turn==="White"&&piece===piece.toUpperCase())||(turn==="Black"&&piece===piece.toLowerCase())))
selected={r,c};
draw();
}

function makeMove(sr,sc,tr,tc){
if(!isLegal(sr,sc,tr,tc))return false;
const snapshot=JSON.parse(JSON.stringify(board));
const moving=board[sr][sc];

// Castling
if(moving.toLowerCase()==='k'&&Math.abs(tc-sc)===2){
if(tc>sc){board[tr][5]=board[tr][7];board[tr][7]=null;} 
else{board[tr][3]=board[tr][0];board[tr][0]=null;}
}

// En passant capture
if(moving.toLowerCase()==='p'&&enPassantTarget&&tr===enPassantTarget.r&&tc===enPassantTarget.c)
board[sr][tc]=null;

board[tr][tc]=moving;
board[sr][sc]=null;

// Pawn promotion
if(moving==='P'&&tr===0||moving==='p'&&tr===7){
let choice=prompt("Promote to (q,r,b,n)","q");
choice=choice?choice.toLowerCase():'q';
if(!"qrbn".includes(choice))choice='q';
board[tr][tc]=moving===moving.toUpperCase()?choice.toUpperCase():choice;
}

// Set en passant target
if(moving.toLowerCase()==='p'&&Math.abs(tr-sr)===2)
enPassantTarget={r:(sr+tr)/2,c:sc};
else enPassantTarget=null;

// Update castle rights
if(moving==='K'){castleRights.whiteK=false;castleRights.whiteQ=false;}
if(moving==='k'){castleRights.blackK=false;castleRights.blackQ=false;}
if(sr===7&&sc===0)castleRights.whiteQ=false;
if(sr===7&&sc===7)castleRights.whiteK=false;
if(sr===0&&sc===0)castleRights.blackQ=false;
if(sr===0&&sc===7)castleRights.blackK=false;

if(isCheck(turn)){board=snapshot;return false;}
return true;
}

function isLegal(sr,sc,tr,tc){
const p=board[sr][sc];
if(!p||sr===tr&&sc===tc)return false;
const target=board[tr][tc];
if(target&&((p===p.toUpperCase())===(target===target.toUpperCase())))return false;
const dr=tr-sr,dc=tc-sc;
const absDr=Math.abs(dr),absDc=Math.abs(dc);

function clear(){let r=sr+Math.sign(dr),c=sc+Math.sign(dc);
while(r!==tr||c!==tc){if(board[r][c])return false;r+=Math.sign(dr);c+=Math.sign(dc);}return true;}

switch(p.toLowerCase()){
case'p':{
const dir=p==='P'?-1:1;
if(dc===0&&!target){if(dr===dir)return true;
if((sr===6&&p==='P'||sr===1&&p==='p')&&dr===2*dir&&!board[sr+dir][sc])return true;}
if(absDc===1&&dr===dir&&(target||enPassantTarget&&tr===enPassantTarget.r&&tc===enPassantTarget.c))return true;
return false;}
case'r':return (sr===tr||sc===tc)&&clear();
case'n':return absDr===2&&absDc===1||absDr===1&&absDc===2;
case'b':return absDr===absDc&&clear();
case'q':return (sr===tr||sc===tc||absDr===absDc)&&clear();
case'k':{
if(absDr<=1&&absDc<=1)return true;
// Castling
if(p==='K'&&sr===7&&sc===4&&dr===0&&absDc===2){
if(tc===6&&castleRights.whiteK&&!board[7][5]&&!board[7][6])return true;
if(tc===2&&castleRights.whiteQ&&!board[7][1]&&!board[7][2]&&!board[7][3])return true;}
if(p==='k'&&sr===0&&sc===4&&dr===0&&absDc===2){
if(tc===6&&castleRights.blackK&&!board[0][5]&&!board[0][6])return true;
if(tc===2&&castleRights.blackQ&&!board[0][1]&&!board[0][2]&&!board[0][3])return true;}
return false;}
}
return false;
}

function findKing(color){
for(let r=0;r<8;r++)for(let c=0;c<8;c++){
if(board[r][c]===(color==="White"?'K':'k'))return{r,c};}
}

function isCheck(color){
const king=findKing(color);
for(let r=0;r<8;r++)for(let c=0;c<8;c++){
const p=board[r][c];
if(p&&((color==="White"&&p===p.toLowerCase())||(color==="Black"&&p===p.toUpperCase())))
if(isLegal(r,c,king.r,king.c))return true;}
return false;
}

function isCheckmate(color){
if(!isCheck(color))return false;
for(let sr=0;sr<8;sr++)for(let sc=0;sc<8;sc++){
const p=board[sr][sc];
if(p&&((color==="White"&&p===p.toUpperCase())||(color==="Black"&&p===p.toLowerCase()))){
for(let tr=0;tr<8;tr++)for(let tc=0;tc<8;tc++){
const snap=JSON.parse(JSON.stringify(board));
if(isLegal(sr,sc,tr,tc)){board[tr][tc]=board[sr][sc];board[sr][sc]=null;
if(!isCheck(color)){board=snap;return false;}board=snap;}}}}
return true;
}

resetGame();

function updateMaterial(){
const values={p:1,n:3,b:3,r:5,q:9,k:0};
let white=0,black=0;
for(let r=0;r<8;r++){
for(let c=0;c<8;c++){
const p=board[r][c];
if(p){
const val=values[p.toLowerCase()];
if(p===p.toUpperCase())white+=val;
else black+=val;
}
}}
let diff=white-black;
let text="Material: ";
if(diff>0)text+="White +"+diff;
else if(diff<0)text+="Black +"+Math.abs(diff);
else text+="Even";
document.getElementById("material").textContent=text;
}
</script>
</body>
</html>
